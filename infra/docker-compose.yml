
services:

  mongodb:
    image: mongo:6.0
    container_name: visor360-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - visor360-network

  # ===== BACKEND =====
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile_Back
    container_name: visor360-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MODELO_CHAT=llama-3.3-70b-versatile
      - MONGO_URI=${MONGO_URI}
      - HF_HOME=/home/appuser/.cache/huggingface
      - ENTORNO=produccion
      - TZ=America/Mexico_City
    volumes:
      - ../backend/app:/app
      - chroma_data:/home/appuser/chroma_data
      - hf_cache:/home/appuser/.cache/huggingface
      - ../servidor_logs:/app/logs
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - visor360-network

  # ===== WORKER (Tractor de Ingesta) =====
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile_Worker
    container_name: visor360-worker
    environment:
      - MONGO_URI=${MONGO_URI}
      - HF_HOME=/home/appuser/.cache/huggingface
      - TZ=America/Mexico_City
    volumes:
      - ../backend/app:/app
      # Comparte la misma base de datos vectorial que el backend
      - chroma_data:/home/appuser/chroma_data
      - hf_cache:/home/appuser/.cache/huggingface
      - ../servidor_logs:/app/logs
      
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - visor360-network
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile_Front
    container_name: visor360-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - visor360-network

volumes:
  mongo_data:
  chroma_data:
  hf_cache:

networks:
  visor360-network:
    driver: bridge
