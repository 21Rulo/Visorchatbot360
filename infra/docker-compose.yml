version: '3.9'

services:

  mongodb:
    image: mongo:6.0
    container_name: visor360-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - visor360-network

  # ===== BACKEND =====
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile_Back
    container_name: visor360-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MODELO_CHAT=llama-3.3-70b-versatile
      - MONGO_URI=${MONGO_URI}
      #- ENTORNO=produccion
    volumes:
      - ../backend/app:/app
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - visor360-network

  # ===== FRONTEND =====
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile_Front
    container_name: visor360-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - visor360-network

volumes:
  mongo_data:

networks:
  visor360-network:
    driver: bridge
